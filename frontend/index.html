<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProvisionOps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-900 min-h-screen text-white">
  <header class="bg-slate-800 shadow-lg border-b border-slate-700">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <h1 class="text-xl font-bold text-white">ProvisionOps</h1>
        <span class="text-sm text-slate-400 hidden sm:inline">Provisionnement self-service Proxmox</span>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <div id="app">
      <div class="text-center py-12">
        <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto"></div>
        <p class="text-slate-400 mt-4">Connexion à Proxmox...</p>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
